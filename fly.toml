# fly.toml app configuration file generated for dream-pictures
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "dream-pictures-2026"
primary_region = "bom"

[build]

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = "production"
  PORT = "5000"
  ADMIN_USERNAME = "714752420017"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
